apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: macvlan-db-net
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "macvlan",
      "mode": "bridge",
      "master": "eth0",
      "ipam": {
        "type": "host-local",
        "subnet": "10.0.1.0/24",
        "rangeStart": "10.0.1.100",
        "rangeEnd": "10.0.1.200",
        "routes": [
          { "dst": "10.0.1.0/24" }
        ],
        "gateway": "10.0.1.1"
      }
    }
