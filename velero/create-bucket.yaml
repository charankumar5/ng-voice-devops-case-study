apiVersion: batch/v1
kind: Job
metadata:
  name: minio-create-bucket
  namespace: minio-system
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for MinIO...";
              sleep 15;
              mc alias set local http://minio:9000 minio-admin minio-password;
              mc mb local/velero-backups || true;