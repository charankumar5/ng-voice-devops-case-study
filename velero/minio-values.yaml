# Using official MinIO Helm chart — https://charts.min.io/
# standalone mode is fine for local KIND — no need for distributed setup

mode: standalone

rootUser: "minio-admin"
rootPassword: "minio-password"

persistence:
  enabled: true
  size: 10Gi

resources:
  requests:
    memory: 512Mi

service:
  type: ClusterIP
  port: 9000

consoleService:
  type: ClusterIP
  port: 9001

# Create the velero-backups bucket automatically on startup
# so we don't have to exec into the pod and run mc commands manually
buckets:
  - name: velero-backups
    policy: none
    purge: false

