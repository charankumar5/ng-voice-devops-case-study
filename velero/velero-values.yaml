# No change needed here — Velero still talks to MinIO via S3 API.
# Just make sure the s3Url points to the MinIO service in minio-system namespace.
configuration:
  backupStorageLocation:
    - name: default
      provider: aws
      bucket: velero-backups
      config:
        region: minio
        s3ForcePathStyle: "true"
        s3Url: http://minio.minio-system.svc.cluster.local:9000
  volumeSnapshotLocation: []

credentials:
  useSecret: true
  secretContents:
    cloud: |
      [default]
      aws_access_key_id=minio-admin
      aws_secret_access_key=minio-password

initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.9.0
    volumeMounts:
      - mountPath: /target
        name: plugins